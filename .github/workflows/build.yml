name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Verify and set Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "Using SDK: $SDK_PATH"
          ls "$SDK_PATH/platforms/" 2>/dev/null || echo "platforms dir not found"
          ls "$SDK_PATH/build-tools/" 2>/dev/null || echo "build-tools dir not found"
          echo "sdk.dir=$SDK_PATH" > local.properties
          echo "local.properties written:"
          cat local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log; exit ${PIPESTATUS[0]}

      - name: Print build log on failure
        if: failure()
        run: cat build.log || echo "(no build.log found)"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenPact-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
