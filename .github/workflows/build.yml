name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Install Android SDK components
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "Android SDK at: $SDK"
          echo "sdk.dir=$SDK" > local.properties
          cat local.properties
          # Accept licenses and install required components
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$SDK/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "Installed platforms:"; ls "$SDK/platforms/" 2>/dev/null || true
          echo "Installed build-tools:"; ls "$SDK/build-tools/" 2>/dev/null || true

      - name: Build debug APK
        run: |
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Build failed — last 80 lines of log:"
            tail -80 build.log | while IFS= read -r line; do echo "::error::$line"; done
          fi
          exit $STATUS

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenPact-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
